server {
    server_name kchng.org www.kchng.org;

    # Client max body size
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/kachi-access.log;
    error_log /var/log/nginx/kachi-error.log;

    # Serve static files
    root /opt/deployments/kchng;
    index index.html;

    # Gun relay WebSocket proxy - MUST be before main location
    location /gun {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers (with Stellar + Gun support)
    add_header "Content-Security-Policy" "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: https://stellar.creit.tech; font-src 'self' data:; connect-src 'self' wss://kchng.org https://api.openai.com https://openrouter.ai https://api.openrouter.ai https://*.openrouter.ai https://what3words.com https://api.what3words.com https://*.what3words.com https://horizon.stellar.org https://*.stellar.org https://stellar.creit.tech;" always;
    add_header "Referrer-Policy" "strict-origin-when-cross-origin" always;
    add_header "Strict-Transport-Security" "max-age=31536000; includeSubDomains" always;
    add_header "X-Content-Type-Options" "nosniff" always;
    add_header "X-Frame-Options" "SAMEORIGIN" always;
    add_header "X-XSS-Protection" "1; mode=block" always;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kchng.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kchng.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.kchng.org) {
        return 301 https://$host$request_uri;
    }
    if ($host = kchng.org) {
        return 301 https://$host$request_uri;
    }
    server_name kchng.org www.kchng.org;
    listen 80;
    return 404;
}
