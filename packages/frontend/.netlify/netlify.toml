headersOrigin = "config"
redirectsOrigin = "config"

[build]
publish = "/home/pokho/dev/KCHNG/packages/frontend/build"
publishOrigin = "config"
commandOrigin = "config"
base = "/home/pokho/dev/KCHNG/packages/frontend"
command = "pnpm build && pnpm test:smoke"

[build.environment]
NODE_VERSION = "20.19"
NODE_ENV = "production"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

# Netlify Functions configuration
[functions]
directory = "/home/pokho/dev/KCHNG/packages/frontend/netlify/functions"
node_bundler = "esbuild"

[functions."*"]

[[plugins]]
origin = "config"
package = "@netlify/plugin-lighthouse"

[plugins.inputs]

[plugins.inputs.thresholds]
performance = 0.9
accessibility = 0.9
best-practices = 0.9
seo = 0.9

[[headers]]
for = "/*"

[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/_app/immutable/*"

[headers.values]
Cache-Control = "public, immutable, max-age=31536000"

[[headers]]
for = "/*.js"

[headers.values]
Content-Type = "application/javascript; charset=utf-8"

[[headers]]
for = "/*.css"

[headers.values]
Content-Type = "text/css; charset=utf-8"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]