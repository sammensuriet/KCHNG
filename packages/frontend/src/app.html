    <meta name="keywords" content="KCHNG, community currency, demurrage, Stellar, Soroban, labor-backed, local currency" />
    <meta property="og:title" content="KCHNG - A Community Currency with Demurrage" />
    <meta property="og:description" content="Labor-backed currency on Stellar where new tokens are minted through verified work. Now live on mainnet!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kachi.ng" />

    <meta name="twitter:image" content="https://kachi.ng/og-image.png" />
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KCHNG" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%sveltekit.assets%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%sveltekit.assets%/icons/icon-512.png" />
    <title>KCHNG - Labor-Backed Community Currency | Live on Stellar Mainnet</title>
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "KCHNG",
      "url": "https://kachi.ng",
      "logo": "https://kachi.ng/icons/icon-512.png",
      "description": "A labor-backed community currency with native on-chain demurrage on Stellar.",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KCHNG",
      "url": "https://kachi.ng",
      "description": "Labor-backed community currency on Stellar where 30 minutes work = 1000 KCHNG = 1 local community meal.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "KCHNG"
      }
    }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- Hidden Netlify form for build-time detection (required for adapter-static) -->
    <form name="feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden style="display: none;">
      <input type="hidden" name="form-name" value="feedback" />
      <input type="text" name="bot-field" tabindex="-1" autocomplete="off" />
      <input type="text" name="category" />
      <input type="text" name="message" />
      <input type="text" name="page" />
      <input type="text" name="wallet" />
    </form>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
