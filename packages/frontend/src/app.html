<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="KCHNG - Community work exchange for eco-villages, cooperatives, and community spaces. 30 minutes work = 1 shared meal. Built on Stellar." />
    <meta name="keywords" content="KCHNG, community currency, work exchange, community service, eco-village, cooperative, Stellar, local currency" />
    <meta property="og:title" content="KCHNG - Community Work Exchange" />
    <meta property="og:description" content="Turn community service into shared value. For communities who want to track and reward the work that keeps them running." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kchng.org" />
    <meta property="og:image" content="https://kchng.org/og-image.png" />
    <meta property="og:site_name" content="KCHNG" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KCHNG - Community Work Exchange" />
    <meta name="twitter:description" content="Turn community service into shared value. For communities who want to track and reward the work that keeps them running." />
    <meta name="twitter:image" content="https://kchng.org/og-image.png" />
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KCHNG" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%sveltekit.assets%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%sveltekit.assets%/icons/icon-512.png" />
    <title>KCHNG - Community Work Exchange | Track and Reward Community Service</title>
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "KCHNG",
      "url": "https://kchng.org",
      "logo": "https://kchng.org/icons/icon-512.png",
      "description": "A community work exchange system for tracking and rewarding community service.",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KCHNG",
      "url": "https://kchng.org",
      "description": "Community work exchange on Stellar where 30 minutes work = 1 shared meal. For eco-villages, cooperatives, and community spaces.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "KCHNG"
      }
    }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- Hidden Netlify form for build-time detection (required for adapter-static) -->
    <form name="feedback" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="feedback" />
      <input type="text" name="bot-field" />
      <input type="text" name="firstName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="category" />
      <input type="text" name="message" />
      <input type="text" name="page" />
      <input type="text" name="network" />
      <input type="text" name="walletAddress" />
      <input type="checkbox" name="contactConsent" />
    </form>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
